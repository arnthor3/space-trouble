<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Space Trouble</title>
    <link rel="stylesheet" href="/src/style.css" />
    <!-- <link rel="manifest" href="/manifest.json" /> -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="theme-color" content="#00ffcc" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
  </head>
  <body>
    <div id="app">
      <!-- Translucent Glassmorphic Touch Controls for iPad/Mobile -->
      <div class="touch-controls" id="touch-controls">
        <div class="control-group">
          <button id="btn-left" class="control-btn" aria-label="Move Left">
            <svg viewBox="0 0 24 24">
              <path
                d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"
              />
            </svg>
          </button>
          <button id="btn-right" class="control-btn" aria-label="Move Right">
            <svg viewBox="0 0 24 24">
              <path
                d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8-8-8z"
              />
            </svg>
          </button>
        </div>
        <div class="control-group">
          <button id="btn-down" class="control-btn down-btn" aria-label="Down">
            <svg viewBox="0 0 24 24">
              <path
                d="M20 12l-1.41-1.41L13 16.17V4h-2v12.17l-5.58-5.59L4 12l8 8 8-8z"
              />
            </svg>
          </button>
          <button
            id="btn-build"
            class="control-btn build-btn"
            aria-label="Build"
          >
            <svg viewBox="0 0 24 24">
              <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
            </svg>
          </button>
          <button id="btn-jump" class="control-btn jump-btn" aria-label="Jump">
            <svg viewBox="0 0 24 24">
              <path
                d="M4 12l1.41 1.41L11 7.83V20h2V7.83l5.58 5.59L20 12l-8-8z"
              />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
