<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Space Trouble</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <!-- Translucent Glassmorphic Touch Controls for iPad/Mobile -->
      <div class="touch-controls" id="touch-controls">
        <div class="control-group">
          <button id="btn-left" class="control-btn" aria-label="Move Left">
            <svg viewBox="0 0 24 24">
              <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
            </svg>
          </button>
          <button id="btn-right" class="control-btn" aria-label="Move Right">
            <svg viewBox="0 0 24 24">
              <path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8-8-8z"/>
            </svg>
          </button>
        </div>
        <div class="control-group">
          <button id="btn-shoot" class="control-btn shoot-btn" aria-label="Shoot">
            <svg viewBox="0 0 24 24">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17.93c-3.95-.49-7-3.54-7.49-7.49H3.07c.46 5.05 4.5 9.09 9.55 9.55v-2.06zM11 3.07C5.95 3.53 1.91 7.57 1.45 12.62h2.06c.49-3.95 3.54-7 7.49-7.49V3.07zm9.93 7.93c-.49-3.95-3.54-7-7.49-7.49V1.45c5.05.46 9.09 4.5 9.55 9.55h-2.06zm-7.49 9.55c3.95-.49 7-3.54 7.49-7.49h2.06c-.46 5.05-4.5 9.09-9.55 9.55v-2.06z"/>
            </svg>
          </button>
          <button id="btn-jump" class="control-btn jump-btn" aria-label="Jump">
            <svg viewBox="0 0 24 24">
              <path d="M4 12l1.41 1.41L11 7.83V20h2V7.83l5.58 5.59L20 12l-8-8z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
